name: worldcup_friends_predictor
description: A friends-only World Cup match prediction app backed by Supabase.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.7.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_dotenv: ^5.2.1
  flutter_riverpod: ^2.6.1
  freezed_annotation: ^2.4.4
  go_router: ^14.8.1
  intl: ^0.20.2
  json_annotation: ^4.9.0
  supabase_flutter: ^2.8.4
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  build_runner: ^2.4.15
  flutter_lints: ^5.0.0
  freezed: ^2.5.8
  json_serializable: ^6.9.4
  patrol: ^3.15.2

flutter:
  uses-material-design: true
  assets:
    - .env.example
    - assets/
